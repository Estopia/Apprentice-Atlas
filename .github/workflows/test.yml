name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apprentice_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d apprentice_atlas"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: apprentice-atlas
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      UK_API_CONTRACT_CONFIRMED: 'false'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apprentice-atlas/package-lock.json
      - run: npm ci
      - name: Prepare Supabase-compatible roles
        env:
          TASK3_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/apprentice_atlas
        run: |
          psql "$TASK3_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE anon;
          CREATE ROLE authenticated;
          CREATE ROLE service_role;
          CREATE SCHEMA auth;
          CREATE TABLE auth.users (id uuid primary key);
          CREATE FUNCTION auth.uid() RETURNS uuid
          LANGUAGE sql STABLE AS $$
            SELECT nullif(current_setting('request.jwt.claim.sub', true), '')::uuid
          $$;
          SQL
      - name: Apply timestamped migrations
        env:
          TASK3_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/apprentice_atlas
        run: |
          for migration in supabase/migrations/*.sql; do
            psql "$TASK3_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Run tests with PostgreSQL integration enabled
        env:
          TASK3_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/apprentice_atlas
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/apprentice_atlas
        run: npm run test -- tests
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Export web bundle
        run: npx expo export --platform web
      - name: Validate public Expo config
        run: npx expo config --type public

  legacy-provenance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apprentice_atlas_legacy
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d apprentice_atlas_legacy"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: apprentice-atlas
    env:
      UK_API_CONTRACT_CONFIRMED: 'false'

    steps:
      - uses: actions/checkout@v4
      - name: Prepare Supabase-compatible roles
        env:
          LEGACY_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/apprentice_atlas_legacy
        run: |
          psql "$LEGACY_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE anon;
          CREATE ROLE authenticated;
          CREATE ROLE service_role;
          CREATE SCHEMA auth;
          CREATE TABLE auth.users (id uuid primary key);
          CREATE FUNCTION auth.uid() RETURNS uuid
          LANGUAGE sql STABLE AS $$
            SELECT nullif(current_setting('request.jwt.claim.sub', true), '')::uuid
          $$;
          SQL
      - name: Apply initial schema and provenance fixture
        env:
          LEGACY_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/apprentice_atlas_legacy
        run: |
          psql "$LEGACY_DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/20260713090000_initial_schema.sql
          psql "$LEGACY_DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/fixtures/preflight_source_provenance.sql
      - name: Apply preflight and remaining migrations
        env:
          LEGACY_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/apprentice_atlas_legacy
        run: |
          for migration in supabase/migrations/*.sql; do
            case "$migration" in
              *20260713090000_initial_schema.sql) ;;
              *) psql "$LEGACY_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration" ;;
            esac
          done
      - name: Validate provenance backfill and collision repair
        env:
          LEGACY_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/apprentice_atlas_legacy
        run: |
          psql "$LEGACY_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            repaired_external_id text;
            repaired_legacy_id text;
            repaired_source_provider text;
            repaired_source_key text;
          BEGIN
            SELECT external_id, legacy_external_id
              INTO repaired_external_id, repaired_legacy_id
              FROM public.job_sources
             WHERE id = 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaa2';
            IF repaired_external_id NOT LIKE 'legacy-duplicate-%'
              OR repaired_legacy_id <> ' canonical-id ' THEN
              RAISE EXCEPTION 'preflight collision repair regression: %, %', repaired_external_id, repaired_legacy_id;
            END IF;

            SELECT source_provider, source_key
              INTO repaired_source_provider, repaired_source_key
              FROM public.sync_runs
             WHERE id = 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaa3';
            IF repaired_source_provider <> 'provider-b'
              OR repaired_source_key <> 'sync-provider:' || repaired_external_id
              OR repaired_source_key LIKE '%legacy-preflight%' THEN
              RAISE EXCEPTION 'provenance backfill regression: %, %', repaired_source_provider, repaired_source_key;
            END IF;
          END $$;
          SQL
